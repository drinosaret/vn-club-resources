worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ---------- Basics ----------
    server_tokens   off;
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---------- Logging ----------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ---------- Gzip ----------
    gzip on;
    gzip_static on;  # Serve pre-compressed .gz files if they exist (saves CPU)
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        text/javascript
        image/svg+xml;

    # ---------- Bot / datacenter blocking (for Umami analytics) ----------
    # Mapped to 1 = block.  Used only on the /api/send analytics endpoint.
    geo $is_datacenter_bot {
        default 0;

        # Tencent Cloud (AS132203 + AS45090)
        43.128.0.0/12    1;   # 43.128-43.143
        43.152.0.0/13    1;   # 43.152-43.159
        43.160.0.0/11    1;   # 43.160-43.191
        49.51.0.0/16     1;
        49.232.0.0/14    1;   # 49.232-49.235
        62.234.0.0/16    1;
        79.139.0.0/16    1;
        81.70.0.0/15     1;   # 81.70-81.71
        82.156.0.0/15    1;   # 82.156-82.157
        101.32.0.0/14    1;   # 101.32-101.35
        101.42.0.0/15    1;   # 101.42-101.43
        119.28.0.0/15    1;   # 119.28-119.29
        120.24.0.0/14    1;   # 120.24-120.27
        120.53.0.0/16    1;
        124.156.0.0/16   1;
        124.222.0.0/15   1;   # 124.222-124.223
        124.224.0.0/15   1;   # 124.224-124.225
        129.226.0.0/16   1;
        150.109.0.0/16   1;
        152.136.0.0/16   1;
        154.8.0.0/16     1;
        170.106.0.0/16   1;
        192.144.0.0/16   1;
        42.192.0.0/14    1;   # 42.192-42.195 (covers 42.193, 42.194)
        43.143.0.0/16    1;

        # Alibaba Cloud (AS45102)
        8.208.0.0/12     1;   # 8.208-8.223 (covers 8.209-8.222)
        43.106.0.0/16    1;
        43.110.0.0/16    1;
        43.119.0.0/16    1;
        47.74.0.0/15     1;   # 47.74-47.75
        47.76.0.0/14     1;   # 47.76-47.79
        47.82.0.0/15     1;   # 47.82-47.83
        47.86.0.0/15     1;   # 47.86-47.87
        47.88.0.0/14     1;   # 47.88-47.91
        47.236.0.0/14    1;   # 47.236-47.239
        47.242.0.0/15    1;   # 47.242-47.243
        47.245.0.0/16    1;
        47.251.0.0/16    1;
        47.254.0.0/16    1;

        # Byteplus / ByteDance (AS150436)
        101.47.0.0/16    1;
        150.5.128.0/17   1;
        163.7.0.0/16     1;

        # Datacamp Limited (AS212238 + AS60068) — residential proxy network
        37.19.192.0/18   1;
        79.127.0.0/17    1;
        149.34.192.0/18  1;   # wider range to catch .216, .248 etc
        169.150.192.0/18 1;
        173.239.192.0/18 1;
        185.98.164.0/22  1;

        # Datacamp additional ranges
        45.140.184.0/22  1;

        # WorkTitans B.V. (AS209847)
        5.252.20.0/22    1;
        45.12.108.0/22   1;
        45.128.52.0/22   1;
        103.35.188.0/22  1;

        # HostPapa (AS36352)
        107.150.16.0/20  1;

        # Tor exit nodes commonly used by bots
        185.220.100.0/22 1;

        # Clouvider (AS62240)
        83.229.0.0/17    1;
    }

    # ---------- Rate limiting ----------
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # ---------- Cloudflare real IP ----------
    # IPv4 — https://www.cloudflare.com/ips-v4/
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    # IPv6 — https://www.cloudflare.com/ips-v6/
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # ---------- Image cache width mapping ----------
    # Maps ?w= query param to the filename suffix used by the sync script
    map $arg_w $img_width_suffix {
        "20"    "-w20";
        "128"   "-w128";
        "256"   "-w256";
        "512"   "-w512";
        default "";
    }

    # ---------- Upstreams ----------
    upstream frontend {
        server web:3000;
    }

    upstream backend {
        server api:8000;
    }

    upstream umami {
        server umami:3000;
    }

    # ---------- SSL (Cloudflare Origin CA) ----------
    # To enable HTTPS on the origin:
    # 1. Generate an Origin CA cert in Cloudflare dashboard
    # 2. Save cert to deploy/nginx/ssl/origin.pem
    # 3. Save key to deploy/nginx/ssl/origin.key
    # 4. Mount the ssl directory in docker-compose.prod.yml
    # 5. Set Cloudflare SSL/TLS mode to "Full (strict)"
    #
    # Until certs are installed, nginx listens on port 80 only.
    # Cloudflare terminates TLS on the edge; traffic between
    # Cloudflare and origin is over HTTP unless Origin CA is configured.

    # ---------- vnclub.org — Frontend ----------
    server {
        listen 80;
        listen 443 ssl;
        http2 on;
        server_name vnclub.org www.vnclub.org beta.vnclub.org;

        # SSL certs — only loaded if files exist (nginx skips missing includes)
        ssl_certificate     /etc/nginx/ssl/origin.pem;
        ssl_certificate_key /etc/nginx/ssl/origin.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Security headers (defense-in-depth, supplements what Next.js sets)
        add_header X-Robots-Tag "index, follow" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Block source map access
        location ~ \.map$ {
            return 404;
        }

        # Images — serve pre-generated WebP directly from disk cache.
        # Bypasses Node.js entirely for the 99% of images that are pre-cached.
        # Cache misses fall through to Next.js via @img_backend for on-demand generation.
        location ~ ^/img/((?:cv|ch|sf)/\d\d/\d+)\.(jpg|webp)$ {
            alias /data/vndb-cache/$1$img_width_suffix.webp;

            types { }
            default_type image/webp;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Served-By "nginx-cache" always;
            # Re-add security headers (nginx location-level add_header overrides server-level)
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

            # Cache miss → fall back to Next.js (preserves original URL + query params)
            error_page 404 = @img_backend;
            log_not_found off;
        }

        location @img_backend {
            proxy_pass http://frontend$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }

        location / {
            limit_req zone=general burst=200 nodelay;

            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ---------- api.vnclub.org — Backend API ----------
    server {
        listen 80;
        listen 443 ssl;
        http2 on;
        server_name api.vnclub.org;

        ssl_certificate     /etc/nginx/ssl/origin.pem;
        ssl_certificate_key /etc/nginx/ssl/origin.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Security headers (match frontend block)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        location / {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # SSE support (streaming endpoints)
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_read_timeout 3600s;
        }

        # Health check — bypass rate limit
        location = /health {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }

    # ---------- analytics.vnclub.org — Umami ----------
    server {
        listen 80;
        listen 443 ssl;
        http2 on;
        server_name analytics.vnclub.org;

        ssl_certificate     /etc/nginx/ssl/origin.pem;
        ssl_certificate_key /etc/nginx/ssl/origin.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Drop tracking data from datacenter bots (silently returns 200
        # so the client doesn't retry or log errors)
        location = /api/send {
            if ($is_datacenter_bot) {
                return 200 '{"ok":true}';
            }
            proxy_pass http://umami;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location / {
            proxy_pass http://umami;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ---------- Catch-all — reject direct IP access ----------
    server {
        listen 80 default_server;
        listen 443 default_server ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/origin.pem;
        ssl_certificate_key /etc/nginx/ssl/origin.key;

        return 444;
    }
}
