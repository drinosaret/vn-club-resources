name: Deploy to VPS

on:
  push:
    branches:
      - main
    # CI-only and docs changes shouldn't trigger a production deploy.
    paths-ignore:
      - '.github/**'
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

# Least privilege: this job only checks out code and SSHes out; it never uses
# GITHUB_TOKEN for writes.
permissions:
  contents: read

jobs:
  # Build the frontend. A build failure blocks the deploy (deploy needs this).
  verify:
    name: Verify (build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  # Hard gate: the deploy runs ONLY if every other check on the commit is green.
  # Waits for the Security Scan (npm + pip audit) and the CodeQL "Analyze" checks
  # to finish and pass, then confirms CodeQL opened no critical/high alerts. Any
  # red check, or any open critical/high finding, blocks the deploy and the live
  # site stays on the last good version. Fail-closed: a check that never reports,
  # or an API error, also blocks.
  #
  # REQUIRED is an explicit allowlist. Keep it in sync: if you add or rename a
  # check (or CodeQL auto-enables a new language, which adds an "Analyze (<lang>)"
  # check), add it here too, or that new check won't be required to pass.
  required-checks:
    name: Require all checks green
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: read
      security-events: read
    steps:
      - name: Wait for every check to pass, then verify no open CodeQL alerts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REQUIRED=(
            "Frontend dependencies (npm audit)"
            "Backend dependencies (pip-audit)"
            "Analyze (actions)"
            "Analyze (javascript-typescript)"
            "Analyze (python)"
          )
          deadline=$(( $(date +%s) + 1800 ))   # wait up to 30 minutes
          runs_api="repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/check-runs?per_page=100"

          while :; do
            runs="$(gh api --paginate "$runs_api" --jq '.check_runs[] | [.name, .status, (.conclusion // "")] | @tsv' 2>/dev/null || true)"
            pending=""; failed=""
            for name in "${REQUIRED[@]}"; do
              line="$(printf '%s\n' "$runs" | awk -F'\t' -v n="$name" '$1==n{print; exit}')"
              if [ -z "$line" ]; then pending+="  - ${name} (not reported yet)"$'\n'; continue; fi
              status="$(printf '%s' "$line" | cut -f2)"
              conclusion="$(printf '%s' "$line" | cut -f3)"
              if [ "$status" != "completed" ]; then pending+="  - ${name} (${status})"$'\n'; continue; fi
              case "$conclusion" in
                success|neutral|skipped) ;;
                *) failed+="  - ${name} (${conclusion})"$'\n' ;;
              esac
            done
            if [ -n "$failed" ]; then
              printf 'Deploy blocked - these checks did not pass:\n%s' "$failed"; exit 1
            fi
            if [ -z "$pending" ]; then
              echo "All required checks passed."; break
            fi
            if [ "$(date +%s)" -ge "$deadline" ]; then
              printf 'Deploy blocked - timed out waiting for:\n%s' "$pending"; exit 1
            fi
            printf 'Waiting on:\n%s' "$pending"; sleep 20
          done

          # All checks are green. Final guard: refuse to deploy if CodeQL has any
          # open critical/high alert (those are findings in the Security tab, not
          # red checks, so the wait loop above wouldn't catch them). Fail closed if
          # the alerts API can't be read.
          if ! alerts="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/code-scanning/alerts?state=open&per_page=100" \
            --jq '.[] | select(.rule.security_severity_level=="critical" or .rule.security_severity_level=="high") | .number')"; then
            echo "Deploy blocked - could not read CodeQL alerts (failing closed)."; exit 1
          fi
          count="$(printf '%s\n' "$alerts" | grep -c '[0-9]' || true)"
          if [ "$count" -gt 0 ]; then
            echo "Deploy blocked - ${count} open critical/high CodeQL alert(s). See the Security tab."; exit 1
          fi
          echo "No open critical/high CodeQL alerts. Cleared to deploy."

  deploy:
    needs: [verify, required-checks]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          umask 077
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Prefer a pinned host key: set the VPS_KNOWN_HOSTS secret to the output
          # of `ssh-keyscan -H <host>` taken from a trusted machine. Fall back to
          # TOFU keyscan only if the secret is absent (logs a warning).
          if [ -n "$VPS_KNOWN_HOSTS" ]; then
            printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            echo "WARNING: VPS_KNOWN_HOSTS not set; using TOFU ssh-keyscan (MITM-able)." >&2
            ssh-keyscan -H "$VPS_HOST" > ~/.ssh/known_hosts 2>/dev/null
          fi
          chmod 644 ~/.ssh/known_hosts

      - name: Push secrets and run remote deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
          DISCORD_ADMIN_USER_IDS: ${{ secrets.DISCORD_ADMIN_USER_IDS }}
          DISCORD_LOG_WEBHOOK_URL: ${{ secrets.DISCORD_LOG_WEBHOOK_URL }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
          UMAMI_DB_PASSWORD: ${{ secrets.UMAMI_DB_PASSWORD }}
          UMAMI_APP_SECRET: ${{ secrets.UMAMI_APP_SECRET }}
          NEXT_PUBLIC_UMAMI_URL: ${{ secrets.NEXT_PUBLIC_UMAMI_URL }}
          NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${{ secrets.NEXT_PUBLIC_UMAMI_WEBSITE_ID }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          # Build a temp env file under a 077 umask. %q produces a shell-quoted
          # form so the remote bash can safely source the file even if a value
          # contains shell metacharacters ($, |, &, ', ", \, spaces, etc.).
          umask 077
          ENV_FILE=$(mktemp)
          {
            printf 'DISCORD_BOT_TOKEN=%q\n'              "$DISCORD_BOT_TOKEN"
            printf 'DISCORD_GUILD_ID=%q\n'               "$DISCORD_GUILD_ID"
            printf 'DISCORD_ADMIN_USER_IDS=%q\n'         "$DISCORD_ADMIN_USER_IDS"
            printf 'DISCORD_LOG_WEBHOOK_URL=%q\n'        "$DISCORD_LOG_WEBHOOK_URL"
            printf 'TMDB_API_KEY=%q\n'                   "$TMDB_API_KEY"
            printf 'TWITTER_AUTH_TOKEN=%q\n'             "$TWITTER_AUTH_TOKEN"
            printf 'UMAMI_DB_PASSWORD=%q\n'              "$UMAMI_DB_PASSWORD"
            printf 'UMAMI_APP_SECRET=%q\n'               "$UMAMI_APP_SECRET"
            printf 'NEXT_PUBLIC_UMAMI_URL=%q\n'          "$NEXT_PUBLIC_UMAMI_URL"
            printf 'NEXT_PUBLIC_UMAMI_WEBSITE_ID=%q\n'   "$NEXT_PUBLIC_UMAMI_WEBSITE_ID"
            printf 'NEXT_PUBLIC_TURNSTILE_SITE_KEY=%q\n' "$NEXT_PUBLIC_TURNSTILE_SITE_KEY"
            printf 'TURNSTILE_SECRET_KEY=%q\n'           "$TURNSTILE_SECRET_KEY"
            printf 'BACKUP_ENCRYPTION_KEY=%q\n'          "$BACKUP_ENCRYPTION_KEY"
            printf 'R2_ACCESS_KEY_ID=%q\n'               "$R2_ACCESS_KEY_ID"
            printf 'R2_SECRET_ACCESS_KEY=%q\n'           "$R2_SECRET_ACCESS_KEY"
            printf 'R2_ENDPOINT=%q\n'                    "$R2_ENDPOINT"
          } > "$ENV_FILE"

          # scp transfers the file with mode 600 (preserved from local umask).
          # Using -p preserves the mode explicitly.
          scp -p -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
              "$ENV_FILE" "deploy@${VPS_HOST}:/home/deploy/.deploy-secrets.env"

          # Run remote deploy script via stdin so neither the script body
          # nor any secret value lands in the remote process command line.
          # Keepalive so a quiet stretch of the long build doesn't drop the SSH session.
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
              -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o TCPKeepAlive=yes \
              "deploy@${VPS_HOST}" 'bash -s' < scripts/deploy-remote.sh

          rm -f "$ENV_FILE"

      - name: Always remove remote secrets file
        if: always()
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          # Belt-and-suspenders: deploy-remote.sh deletes this immediately
          # after sourcing, but if it crashed first the file would linger.
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
              "deploy@${VPS_HOST}" 'rm -f /home/deploy/.deploy-secrets.env' || true
